<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>認識天氣 AR 互動體驗</title>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    /* 隱藏滾動條，讓 AR 視圖全螢幕顯示 */
    body { margin: 0; overflow: hidden; }
  </style>

  <script>
    AFRAME.registerComponent('touch-transform', {
      init: function () {
        const el = this.el;
        // 保存原始縮放值，用於雙擊重設
        this.defaultScale = el.object3D.scale.x;
        this.currentScale = this.defaultScale;
        this.prevDistance = null;
        this.prevAngle = null;
        this.lastTap = 0;

        // 雙擊重設大小與旋轉
        el.addEventListener('click', () => {
          const now = Date.now();
          if (now - this.lastTap < 300) {
            el.object3D.scale.set(this.defaultScale, this.defaultScale, this.defaultScale);
            el.object3D.rotation.set(0, 0, 0);
            this.currentScale = this.defaultScale;
          }
          this.lastTap = now;
        });

        const canvas = el.sceneEl.canvas;
        
        // 偵測兩指觸控開始：計算初始距離與角度
        canvas.addEventListener('touchstart', (e) => {
          if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            this.prevDistance = Math.hypot(dx, dy);
            this.prevAngle = Math.atan2(dy, dx);
          }
        });

        // 兩指移動時執行縮放與旋轉
        canvas.addEventListener('touchmove', (e) => {
          if (e.touches.length === 2 && this.prevDistance !== null) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.hypot(dx, dy);
            const angle = Math.atan2(dy, dx);

            // 縮放：限制在 0.5 ~ 3 倍之間
            const scaleFactor = dist / this.prevDistance;
            this.currentScale *= scaleFactor;
            this.currentScale = Math.min(Math.max(this.currentScale, 0.5), 3);
            el.object3D.scale.set(this.currentScale, this.currentScale, this.currentScale);

            // 旋轉
            const deltaAngle = angle - this.prevAngle;
            const rot = el.object3D.rotation;
            el.object3D.rotation.set(rot.x, rot.y, rot.z + deltaAngle);

            // 更新參考值
            this.prevDistance = dist;
            this.prevAngle = angle;
            e.preventDefault(); // 避免預設手勢行為
          }
        });

        // 觸控結束後重置參考值
        canvas.addEventListener('touchend', () => {
          if (el.sceneEl.canvas.touches && el.sceneEl.canvas.touches.length < 2) {
            this.prevDistance = null;
            this.prevAngle = null;
          }
        });
      }
    });
  </script>
</head>
<body>
  <a-scene 
    mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiScanning: true;" 
    color-space="sRGB" 
    renderer="colorManagement: true; physicallyCorrectLights: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <img id="info1" src="card11.png" />
      <img id="info2" src="card22.png" />
      <img id="info3" src="card33.png" />
      <img id="info4" src="card44.png" />
      <img id="info5" src="card55.png" />
      <img id="info6" src="card66.png" />
      
      <audio id="audio1" src="audio1.mp3" preload="auto"></audio>
      <audio id="audio2" src="audio2.mp3" preload="auto"></audio>
      <audio id="audio3" src="audio3.mp3" preload="auto"></audio>
      <audio id="audio4" src="audio4.mp3" preload="auto"></audio>
      <audio id="audio5" src="audio5.mp3" preload="auto"></audio>
      <audio id="audio6" src="audio6.mp3" preload="auto"></audio>
    </a-assets>

    <a-light type="ambient" intensity="1.5"></a-light>
    
    <a-camera look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" class="weather-target" data-index="1">
      <a-plane src="#info1" width="1.2" height="0.7" position="0 0 0" touch-transform></a-plane>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 1" class="weather-target" data-index="2">
      <a-plane src="#info2" width="1.2" height="0.7" position="0 0 0" touch-transform></a-plane>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 2" class="weather-target" data-index="3">
      <a-plane src="#info3" width="1.2" height="0.7" position="0 0 0" touch-transform></a-plane>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 3" class="weather-target" data-index="4">
      <a-plane src="#info4" width="1.2" height="0.7" position="0 0 0" touch-transform></a-plane>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 4" class="weather-target" data-index="5">
      <a-plane src="#info5" width="1.2" height="0.7" position="0 0 0" touch-transform></a-plane>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 5" class="weather-target" data-index="6">
      <a-plane src="#info6" width="1.2" height="0.7" position="0 0 0" touch-transform></a-plane>
    </a-entity>

  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // 取得所有帶有 weather-target 類別的標記實體
      const targets = document.querySelectorAll('.weather-target');

      targets.forEach((target) => {
        // 取得該標記對應的 data-index (1~6)
        const index = target.getAttribute('data-index');
        const audio = document.querySelector(`#audio${index}`);

        // 掃描到圖卡：播放音效
        target.addEventListener('targetFound', () => {
          if (audio) {
            // 瀏覽器有時會阻擋自動播放，加上 catch 避免報錯
            audio.play().catch(e => console.log("音效需使用者互動後才能播放", e));
          }
        });

        // 移開圖卡：暫停音效並重置時間
        target.addEventListener('targetLost', () => {
          if (audio) {
            audio.pause();
            audio.currentTime = 0;
          }
        });
      });
    });
  </script>
</body>
</html>
